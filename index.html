        .url-link {

        }
        
        .url-link:hover {

        }
        
        .error-message {

            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .container {

                padding: 20px;
            }

                margin-right: 0;

        // 查询函数
        function queryFundNotice() {
            const city = document.getElementById('cityInput').value.trim();
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            const errorMessage = document.getElementById('errorMessage');
            
            // 清空之前的结果
            resultContent.innerHTML = '';
            resultSection.style.display = 'none';
            errorMessage.style.display = 'none';
            
            if (!city) {
                errorMessage.textContent = '请输入城市名称';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 查找城市或省份信息
            let cityInfo = cityMapping[city];
            let province;
            let region = "";
            
            // 如果找不到城市，尝试直接查找省份
            if (!cityInfo) {
                if (fundNotices[city]) {
                    // 直接输入的是省份名称
                    province = city;
                } else {
                    errorMessage.textContent = `未找到城市或省份 '${city}' 的信息，请检查输入是否正确`;
                    errorMessage.style.display = 'block';
                    return;
                }
            } else {
                // 输入的是城市名称
                province = cityInfo['省份'];
                region = cityInfo['地区'];
            }
            
            // 查找基金通知信息
            const fundNotice = fundNotices[province];
            if (!fundNotice) {
                errorMessage.textContent = `未找到 ${province} 省的自然科学基金申报通知信息`;
                errorMessage.style.display = 'block';
                return;
            }
            
            const noticeUrl = fundNotice['notice_url'];
            const screenshotPath = fundNotice['screenshot_path'];
            
            // 提取通知信息
            const info = noticeInfo[province] || {
                "申报窗口月份": "",
                "主要基金类型": [],
                "限项规则特殊点": []
            };
            
            // 构建结果HTML
            let resultHtml = `
                <div class="result-item">
                    <span class="result-label">输入：</span>
                    <span class="result-value">${city}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">所属省份：</span>
                    <span class="result-value">${province}</span>
                </div>`;
            
            if (region) {
                resultHtml += `
                <div class="result-item">
                    <span class="result-label">所属地区：</span>
                    <span class="result-value">${region}</span>
                </div>`;
            }
            
            resultHtml += `
                <div class="result-item">
                    <span class="result-label">通知网址：</span>
                    <a href="${noticeUrl}" class="url-link" target="_blank">${noticeUrl}</a>
                </div>
                <div class="result-item">
                    <span class="result-label">申报窗口月份：</span>
                    <span class="result-value">${info['申报窗口月份']}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">主要基金类型：</span>
                    <span class="result-value">${info['主要基金类型'].join('、')}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">限项规则特殊点：</span>
                    <span class="result-value">${info['限项规则特殊点'].join('；')}</span>
                </div>`;
            
            resultContent.innerHTML = resultHtml;
            resultSection.style.display = 'block';
        }
